<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GippyeS Studio | Pipe Cleaner Art</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaCTU_JPXQjLP2N0zP1YYa2bRZiVh1FPY",
            authDomain: "gippyes-studio.firebaseapp.com",
            databaseURL: "https://gippyes-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gippyes-studio",
            storageBucket: "gippyes-studio.firebasestorage.app",
            messagingSenderId: "985706700769",
            appId: "1:985706700769:web:03eebf72dda5d59121fca0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.fb = { ref, onValue, push, remove, update };
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fdfafb; overflow-x: hidden; }
        .font-display { font-family: 'Playfair Display', serif; }
        .bg-primary { background-color: #fb7185; }
        .text-primary { color: #fb7185; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .marquee { white-space: nowrap; animation: marquee 20s linear infinite; }
        @keyframes marquee { 0% { transform: translateX(100%); } 100% { transform: translateX(-100%); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        function App() {
            const [page, setPage] = useState('home');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [pass, setPass] = useState("");

            useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.db && window.fb) {
                        window.fb.onValue(window.fb.ref(window.db, 'products'), (snap) => {
                            const data = snap.val();
                            setProducts(data ? Object.keys(data).map(k => ({ id: k, ...data[k] })) : []);
                        });
                        clearInterval(checkFB);
                    }
                }, 500);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [page, products, cart, selectedProduct]);

            const addToCart = (p) => {
                if(p.status === 'oos' || p.status === 'soon') return;
                setCart([...cart, { ...p, cartId: Date.now() }]);
            };

            const updateStatus = (id, status) => {
                window.fb.update(window.fb.ref(window.db, `products/${id}`), { status });
            };

            const getBadge = (status) => {
                if (status === 'oos') return <span className="absolute top-4 left-4 bg-slate-800 text-white text-[10px] font-black px-3 py-1 rounded-full z-10">OUT OF STOCK</span>;
                if (status === 'soon') return <span className="absolute top-4 left-4 bg-primary text-white text-[10px] font-black px-3 py-1 rounded-full z-10">COMING SOON</span>;
                return null;
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* ANNOUNCEMENT BAR */}
                    <div className="bg-slate-900 text-white py-2 overflow-hidden relative">
                        <div className="marquee font-bold text-[10px] uppercase tracking-[0.2em]">
                            ✨ New Collection Dropping This Sunday! &nbsp;&nbsp; • &nbsp;&nbsp; Free Delivery on orders above Rs. 999 &nbsp;&nbsp; • &nbsp;&nbsp; Handmade with Love in Surat
                        </div>
                    </div>

                    <nav className="bg-white/80 backdrop-blur-md border-b border-pink-50 p-4 sticky top-0 z-[100]">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <h1 onClick={() => setPage('home')} className="text-2xl font-black cursor-pointer tracking-tighter">GippyeS.</h1>
                            <button onClick={() => setPage('cart')} className="relative p-2 bg-pink-50 rounded-full">
                                <i data-lucide="shopping-bag" className="w-5 h-5 text-rose-500"></i>
                                {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-primary text-white text-[10px] w-5 h-5 rounded-full flex items-center justify-center font-bold">{cart.length}</span>}
                            </button>
                        </div>
                    </nav>

                    {/* PRODUCT DETAIL VIEW */}
                    <AnimatePresence>
                        {selectedProduct && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[150] bg-white overflow-y-auto">
                                <div className="max-w-6xl mx-auto p-6 pt-20">
                                    <button onClick={() => setSelectedProduct(null)} className="mb-8 font-bold text-slate-400">← Back</button>
                                    <div className="grid md:grid-cols-2 gap-12">
                                        <div className="relative">
                                            {getBadge(selectedProduct.status)}
                                            <img src={selectedProduct.images ? selectedProduct.images[0] : selectedProduct.image} className="w-full rounded-[40px] aspect-square object-cover" />
                                        </div>
                                        <div className="flex flex-col justify-center">
                                            <h2 className="text-4xl font-black mb-2">{selectedProduct.name}</h2>
                                            <p className="text-3xl font-black text-primary mb-6">Rs. {selectedProduct.price}</p>
                                            <p className="text-slate-600 mb-8">{selectedProduct.desc}</p>
                                            
                                            <button 
                                                disabled={selectedProduct.status === 'oos' || selectedProduct.status === 'soon'}
                                                onClick={() => {addToCart(selectedProduct); setSelectedProduct(null)}}
                                                className={`w-full py-6 rounded-3xl font-black text-xl transition-all ${
                                                    selectedProduct.status === 'oos' ? 'bg-slate-200 text-slate-400 cursor-not allowed' : 
                                                    selectedProduct.status === 'soon' ? 'bg-pink-100 text-primary cursor-default' : 
                                                    'bg-primary text-white shadow-xl shadow-rose-100 active:scale-95'
                                                }`}
                                            >
                                                {selectedProduct.status === 'oos' ? 'OUT OF STOCK' : 
                                                 selectedProduct.status === 'soon' ? 'STAY TUNED!' : 'ADD TO BAG'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <main className="flex-grow">
                        {page === 'home' && (
                            <div className="max-w-6xl mx-auto p-6 py-12">
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-8">
                                    {products.map(p => (
                                        <div key={p.id} onClick={() => setSelectedProduct(p)} className="cursor-pointer relative group">
                                            <div className="aspect-[4/5] rounded-[32px] overflow-hidden mb-4 relative">
                                                {getBadge(p.status)}
                                                <img src={p.images ? p.images[0] : p.image} className={`w-full h-full object-cover transition-all duration-500 ${p.status === 'oos' ? 'grayscale opacity-60' : 'group-hover:scale-110'}`} />
                                            </div>
                                            <h3 className="font-bold">{p.name}</h3>
                                            <p className="text-primary font-black">Rs. {p.price}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {page === 'admin' && (
                            <div className="max-w-6xl mx-auto p-6 py-12">
                                {!isAdmin ? (
                                    <div className="max-w-sm mx-auto bg-white p-10 rounded-[40px] shadow-sm text-center">
                                        <input type="password" placeholder="Pass" className="w-full p-4 border rounded-2xl mb-4 text-center" onChange={e => setPass(e.target.value)} />
                                        <button onClick={() => pass === "gippyes123" ? setIsAdmin(true) : alert("No")} className="w-full bg-primary text-white p-4 rounded-2xl font-black">Login</button>
                                    </div>
                                ) : (
                                    <div className="space-y-12">
                                        {/* ADD NEW PRODUCT FORM */}
                                        <div className="bg-white p-8 rounded-[40px] shadow-sm border border-pink-50">
                                            <h2 className="text-2xl font-black mb-6">New Product</h2>
                                            <form className="grid md:grid-cols-2 gap-4" onSubmit={(e) => {
                                                e.preventDefault();
                                                const newP = {
                                                    name: e.target.n.value,
                                                    price: Number(e.target.p.value),
                                                    images: e.target.i.value.split(','),
                                                    desc: e.target.d.value,
                                                    status: e.target.s.value // 'available', 'oos', 'soon'
                                                };
                                                window.fb.push(window.fb.ref(window.db, 'products'), newP);
                                                e.target.reset();
                                            }}>
                                                <input name="n" placeholder="Name" className="p-4 bg-slate-50 rounded-2xl border-none" required />
                                                <input name="p" type="number" placeholder="Price" className="p-4 bg-slate-50 rounded-2xl border-none" required />
                                                <input name="i" placeholder="Images (comma separated)" className="p-4 bg-slate-50 rounded-2xl border-none md:col-span-2" required />
                                                <textarea name="d" placeholder="Description" className="p-4 bg-slate-50 rounded-2xl border-none md:col-span-2" required />
                                                <select name="s" className="p-4 bg-slate-50 rounded-2xl border-none">
                                                    <option value="available">Available Now</option>
                                                    <option value="oos">Out of Stock</option>
                                                    <option value="soon">Coming Soon</option>
                                                </select>
                                                <button className="bg-primary text-white p-4 rounded-2xl font-black">Publish</button>
                                            </form>
                                        </div>

                                        {/* MANAGE EXISTING */}
                                        <div className="grid md:grid-cols-2 gap-6">
                                            {products.map(p => (
                                                <div key={p.id} className="bg-white p-6 rounded-[32px] flex items-center gap-4 border border-slate-100">
                                                    <img src={p.images[0]} className="w-16 h-16 rounded-xl object-cover" />
                                                    <div className="flex-grow">
                                                        <p className="font-bold text-sm">{p.name}</p>
                                                        <select 
                                                            value={p.status || 'available'} 
                                                            onChange={(e) => updateStatus(p.id, e.target.value)}
                                                            className="text-xs bg-pink-50 text-primary font-bold rounded-lg p-1 mt-1 border-none outline-none"
                                                        >
                                                            <option value="available">Available</option>
                                                            <option value="oos">Out of Stock</option>
                                                            <option value="soon">Coming Soon</option>
                                                        </select>
                                                    </div>
                                                    <button onClick={() => window.fb.remove(window.fb.ref(window.db, `products/${p.id}`))} className="text-slate-300 hover:text-rose-500"><i data-lucide="trash-2"></i></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    <footer className="p-12 text-center">
                        <p onClick={() => setPage('admin')} className="text-[10px] font-bold text-slate-300 cursor-pointer uppercase tracking-widest">Studio Admin</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
