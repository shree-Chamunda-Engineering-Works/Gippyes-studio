<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GippyeS Studio | Live Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaCTU_JPXQjLP2N0zP1YYa2bRZiVh1FPY",
            authDomain: "gippyes-studio.firebaseapp.com",
            databaseURL: "https://gippyes-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gippyes-studio",
            storageBucket: "gippyes-studio.firebasestorage.app",
            messagingSenderId: "985706700769",
            appId: "1:985706700769:web:03eebf72dda5d59121fca0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        window.db = db;
        window.fb = { ref, onValue, push, remove };
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #fcfafa; scroll-behavior: smooth; }
        .font-display { font-family: 'Playfair Display', serif; }
        .bg-primary { background-color: #fb7185; }
        .text-primary { color: #fb7185; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .product-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [page, setPage] = useState('home');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [pass, setPass] = useState("");

            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.db && window.fb) {
                        const productsRef = window.fb.ref(window.db, 'products');
                        window.fb.onValue(productsRef, (snapshot) => {
                            const data = snapshot.val();
                            if (data) {
                                const list = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                                setProducts(list);
                            } else { setProducts([]); }
                        });
                        clearInterval(checkFirebase);
                    }
                }, 500);
                return () => clearInterval(checkFirebase);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [page, products, cart]);

            const addNewProduct = (e) => {
                e.preventDefault();
                const newP = {
                    name: e.target.name.value,
                    price: Number(e.target.price.value),
                    image: e.target.image.value
                };
                window.fb.push(window.fb.ref(window.db, 'products'), newP);
                e.target.reset();
                alert("Successfully added for all customers!");
            };

            const deleteProduct = (id) => {
                if(confirm("Remove this from the shop globally?")) {
                    window.fb.remove(window.fb.ref(window.db, `products/${id}`));
                }
            };

            const total = cart.reduce((s, i) => s + i.price, 0);

            const handlePayment = () => {
                const upiId = "mahirabha0@okhdfcbank";
                const upiUrl = `upi://pay?pa=${upiId}&pn=GippyeS%20Studio&am=${total}&cu=INR`;
                window.location.href = upiUrl;
                setTimeout(() => {
                    const msg = `New Order from GippyeS Studio!\nTotal: Rs. ${total}\nI have completed the payment.`;
                    window.open(`https://wa.me/917383455094?text=${encodeURIComponent(msg)}`, '_blank');
                }, 2000);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-white/80 backdrop-blur-md border-b border-pink-100 p-4 sticky top-0 z-50 flex justify-between items-center">
                        <div className="flex items-center gap-3 cursor-pointer" onClick={() => setPage('home')}>
                            <div className="w-10 h-10 rounded-full bg-pink-100 flex items-center justify-center text-primary font-bold">GS</div>
                            <h1 className="text-xl font-black">GippyeS <span className="text-[10px] text-primary uppercase tracking-tighter">Studio</span></h1>
                        </div>
                        <button onClick={() => setPage('cart')} className="relative p-2">
                            <i data-lucide="shopping-bag"></i>
                            {cart.length > 0 && <span className="absolute top-0 right-0 bg-primary text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center font-bold border-2 border-white">{cart.length}</span>}
                        </button>
                    </nav>

                    <div className={`page ${page === 'home' ? 'active' : ''}`}>
                        <header className="bg-gradient-to-b from-pink-50 to-white py-16 px-6 text-center">
                            <h2 className="font-display text-5xl md:text-7xl font-black mb-4">Handmade <span className="text-primary italic">Art</span></h2>
                            <p className="text-slate-500 max-w-md mx-auto">Unique Pipe Cleaner Florals & Handmade Gifts</p>
                        </header>

                        <section id="shop" className="max-w-6xl mx-auto p-6 grid grid-cols-2 md:grid-cols-4 gap-8 py-12">
                            {products.length === 0 ? (
                                <div className="col-span-full text-center py-20">
                                    <p className="text-slate-400">The shop is currently being updated...</p>
                                </div>
                            ) : products.map(p => (
                                <div key={p.id} className="product-card cursor-pointer group" onClick={() => {setCart([...cart, p]); alert("Added to cart!")}}>
                                    <div className="aspect-[4/5] rounded-[40px] overflow-hidden bg-white border border-slate-100 mb-4 shadow-sm relative">
                                        <img src={p.image} className="w-full h-full object-cover transition-transform" />
                                        <div className="absolute bottom-4 right-4 bg-white/90 p-3 rounded-full opacity-0 group-hover:opacity-100 transition-all">+</div>
                                    </div>
                                    <h3 className="font-bold text-slate-800">{p.name}</h3>
                                    <p className="text-primary font-black">Rs. {p.price}</p>
                                </div>
                            ))}
                        </section>
                    </div>

                    <div className={`page ${page === 'cart' ? 'active' : ''} p-6`}>
                        <div className="max-w-md mx-auto py-10">
                            <h2 className="text-4xl font-black mb-8">My Cart</h2>
                            {cart.length === 0 ? <p className="text-slate-400">Cart is empty</p> : (
                                <>
                                    {cart.map((item, i) => (
                                        <div key={i} className="flex justify-between border-b py-4">
                                            <span>{item.name}</span>
                                            <span className="font-bold">Rs. {item.price}</span>
                                        </div>
                                    ))}
                                    <div className="text-2xl font-black py-6 flex justify-between">
                                        <span>Total</span>
                                        <span className="text-primary">Rs. {total}</span>
                                    </div>
                                    <button onClick={handlePayment} className="w-full bg-primary text-white py-5 rounded-3xl font-bold shadow-xl">Complete Order</button>
                                </>
                            )}
                        </div>
                    </div>

                    <div className={`page ${page === 'admin' ? 'active' : ''} p-6`}>
                        <div className="max-w-2xl mx-auto py-10">
                            {!isAdmin ? (
                                <div className="text-center bg-white p-10 rounded-[40px] border shadow-sm">
                                    <h2 className="text-2xl font-bold mb-6">Studio Manager</h2>
                                    <input type="password" onChange={(e)=>setPass(e.target.value)} className="w-full p-4 border rounded-2xl mb-4 text-center outline-none focus:ring-2 ring-pink-100" placeholder="Password" />
                                    <button onClick={() => pass === "gippyes123" ? setIsAdmin(true) : alert("Wrong Password")} className="bg-primary text-white px-10 py-3 rounded-2xl font-bold w-full">Login</button>
                                </div>
                            ) : (
                                <div>
                                    <div className="flex justify-between items-center mb-8">
                                        <h2 className="text-3xl font-black">Live Inventory</h2>
                                        <button onClick={() => setIsAdmin(false)} className="text-primary font-bold">Logout</button>
                                    </div>
                                    <form onSubmit={addNewProduct} className="bg-white p-8 rounded-[40px] border mb-10 space-y-4">
                                        <input name="name" placeholder="Item Name" className="w-full p-4 bg-slate-50 rounded-2xl outline-none" required />
                                        <input name="price" type="number" placeholder="Price (INR)" className="w-full p-4 bg-slate-50 rounded-2xl outline-none" required />
                                        <input name="image" placeholder="Image Link (e.g. Imgur)" className="w-full p-4 bg-slate-50 rounded-2xl outline-none" required />
                                        <button className="w-full bg-primary text-white py-4 rounded-2xl font-bold">Add Live to Shop</button>
                                    </form>
                                    <div className="space-y-4">
                                        {products.map(p => (
                                            <div key={p.id} className="flex justify-between bg-white p-4 rounded-2xl border items-center">
                                                <div className="flex items-center gap-3">
                                                    <img src={p.image} className="w-10 h-10 rounded-lg object-cover" />
                                                    <span className="font-bold text-sm">{p.name}</span>
                                                </div>
                                                <button onClick={() => deleteProduct(p.id)} className="text-rose-500 font-bold text-xs uppercase">Delete</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    <footer className="mt-auto p-12 bg-white text-center border-t border-pink-50">
                        <p className="font-black text-slate-900">GippyeS Studio</p>
                        <div className="flex justify-center gap-6 mt-4 text-sm font-bold">
                            <a href="https://instagram.com/_gippyes_studio_/" target="_blank" className="text-primary">Instagram</a>
                            <button onClick={() => setPage('admin')} className="text-slate-300">Admin</button>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
