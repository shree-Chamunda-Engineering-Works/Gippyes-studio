<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GippyeS Studio | Premium Art</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaCTU_JPXQjLP2N0zP1YYa2bRZiVh1FPY",
            authDomain: "gippyes-studio.firebaseapp.com",
            databaseURL: "https://gippyes-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gippyes-studio",
            storageBucket: "gippyes-studio.firebasestorage.app",
            messagingSenderId: "985706700769",
            appId: "1:985706700769:web:03eebf72dda5d59121fca0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.fb = { ref, onValue, push, remove, update };
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #1d1d1f; -webkit-tap-highlight-color: transparent; }
        .font-display { font-family: 'Playfair Display', serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: saturate(180%) blur(20px); }
        .apple-card { border-radius: 32px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .status-badge { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        function App() {
            const [page, setPage] = useState('home');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [pass, setPass] = useState("");
            
            // Delivery Info
            const [custName, setCustName] = useState("");
            const [custAdd, setCustAdd] = useState("");
            const [custNum, setCustNum] = useState("");

            useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.db && window.fb) {
                        window.fb.onValue(window.fb.ref(window.db, 'products'), (snap) => {
                            const data = snap.val();
                            setProducts(data ? Object.keys(data).map(k => ({ id: k, ...data[k] })) : []);
                        });
                        clearInterval(checkFB);
                    }
                }, 500);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [page, products, cart, selectedProduct]);

            // Helper to handle multiple images
            const getImgs = (p) => {
                if (!p) return [];
                if (Array.isArray(p.images)) return p.images;
                if (typeof p.images === 'string') return p.images.split(',').map(s => s.trim());
                return [p.image || "https://via.placeholder.com/600"];
            };

            const total = cart.reduce((s, i) => s + i.price, 0);

            const handleCheckout = () => {
                if (!custName || !custAdd || !custNum) {
                    alert("Please fill your details first!");
                    return;
                }
                const productList = cart.map(item => `• ${item.name}: Rs. ${item.price}`).join('%0A');
                const msg = `🛍️ *New Order from GippyeS Studio*%0A%0A*Customer:* ${custName}%0A*Phone:* ${custNum}%0A*Address:* ${custAdd}%0A%0A*Items:*%0A${productList}%0A%0A*Total:* Rs. ${total}%0A%0A📌 *Note:* Payment SS follows below.`;

                window.location.href = `upi://pay?pa=mahirabha0@okhdfcbank&pn=GippyeS%20Studio&am=${total}&cu=INR`;
                setTimeout(() => {
                    window.open(`https://wa.me/919601650687?text=${msg}`, '_blank');
                    setCart([]); setPage('home');
                }, 2500);
            };

            const addNewProduct = (e) => {
                e.preventDefault();
                const newP = {
                    name: e.target.n.value,
                    price: Number(e.target.p.value),
                    images: e.target.i.value, // Now takes comma separated list
                    desc: e.target.d.value,
                    status: e.target.s.value
                };
                window.fb.push(window.fb.ref(window.db, 'products'), newP);
                e.target.reset();
                alert("Product Added!");
            };

            return (
                <div className="min-h-screen">
                    {/* NAV */}
                    <nav className="glass-nav border-b border-gray-100 p-4 sticky top-0 z-[100] flex justify-between items-center px-6 md:px-20">
                        <h1 onClick={() => setPage('home')} className="text-xl font-black cursor-pointer">GippyeS <span className="text-rose-500 text-[10px] uppercase tracking-widest">Studio</span></h1>
                        <button onClick={() => setPage('cart')} className="relative p-2">
                            <i data-lucide="shopping-bag" className="w-5 h-5"></i>
                            {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-zinc-900 text-white text-[9px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{cart.length}</span>}
                        </button>
                    </nav>

                    <main>
                        {page === 'home' && (
                            <div className="max-w-7xl mx-auto px-6 py-12">
                                <div className="grid grid-cols-2 md:grid-cols-4 gap-6">
                                    {products.map(p => (
                                        <div key={p.id} onClick={() => setSelectedProduct(p)} className="apple-card group cursor-pointer">
                                            <div className="aspect-[4/5] rounded-[30px] overflow-hidden bg-gray-50 mb-4 relative border shadow-sm">
                                                <img src={getImgs(p)[0]} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" />
                                                {p.status === 'oos' && <div className="absolute inset-0 bg-white/60 flex items-center justify-center status-badge">Sold Out</div>}
                                                {p.status === 'soon' && <div className="absolute inset-0 bg-rose-50/20 flex items-center justify-center status-badge text-rose-500">Coming Soon</div>}
                                            </div>
                                            <h3 className="font-bold text-sm px-2">{p.name}</h3>
                                            <p className="text-rose-500 font-black text-sm px-2">Rs. {p.price}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {page === 'cart' && (
                            <div className="max-w-xl mx-auto px-6 py-20">
                                <h2 className="text-4xl font-black mb-10 italic">Your Bag</h2>
                                {cart.length === 0 ? <p className="text-gray-400">Bag is empty.</p> : (
                                    <div className="space-y-8">
                                        <div className="bg-gray-50 p-6 rounded-[32px] space-y-4">
                                            {cart.map((item, i) => (
                                                <div key={i} className="flex justify-between items-center font-bold text-sm">
                                                    <span>{item.name}</span>
                                                    <span className="text-rose-500">Rs. {item.price}</span>
                                                </div>
                                            ))}
                                            <div className="border-t pt-4 flex justify-between text-2xl font-black">
                                                <span>Total</span>
                                                <span>Rs. {total}</span>
                                            </div>
                                        </div>
                                        
                                        <div className="bg-white border p-6 rounded-[32px] space-y-4">
                                            <input placeholder="Full Name" className="w-full p-4 bg-gray-50 rounded-xl outline-none" onChange={(e)=>setCustName(e.target.value)} />
                                            <input placeholder="WhatsApp Number" className="w-full p-4 bg-gray-50 rounded-xl outline-none" onChange={(e)=>setCustNum(e.target.value)} />
                                            <textarea placeholder="Address with Pincode" className="w-full p-4 bg-gray-50 rounded-xl outline-none h-24" onChange={(e)=>setCustAdd(e.target.value)} />
                                        </div>

                                        <button onClick={handleCheckout} className="w-full bg-zinc-900 text-white py-6 rounded-full font-bold shadow-xl active:scale-95 transition-all">
                                            PAY & ORDER
                                        </button>
                                    </div>
                                )}
                            </div>
                        )}

                        {page === 'admin' && (
                            <div className="max-w-2xl mx-auto px-6 py-20">
                                {!isAdmin ? (
                                    <div className="text-center bg-gray-50 p-12 rounded-[40px]">
                                        <input type="password" placeholder="Key" className="p-4 rounded-xl mb-4" onChange={e=>setPass(e.target.value)} />
                                        <button onClick={() => pass === 'gippyes123' && setIsAdmin(true)} className="block mx-auto bg-black text-white px-10 py-3 rounded-full font-bold">Access</button>
                                    </div>
                                ) : (
                                    <div className="space-y-8">
                                        <form onSubmit={addNewProduct} className="bg-gray-50 p-8 rounded-[40px] grid gap-4">
                                            <h3 className="font-bold text-xl mb-4">Add Product</h3>
                                            <input name="n" placeholder="Name" className="p-4 rounded-xl border-none" required />
                                            <input name="p" type="number" placeholder="Price" className="p-4 rounded-xl border-none" required />
                                            <textarea name="i" placeholder="Image URLs (Separated by commas)" className="p-4 rounded-xl border-none" required />
                                            <textarea name="d" placeholder="Description" className="p-4 rounded-xl border-none" />
                                            <select name="s" className="p-4 rounded-xl border-none font-bold">
                                                <option value="available">Available</option>
                                                <option value="oos">Sold Out</option>
                                                <option value="soon">Coming Soon</option>
                                            </select>
                                            <button className="bg-rose-500 text-white py-4 rounded-xl font-bold">Update Globally</button>
                                        </form>
                                        <div className="grid gap-2">
                                            {products.map(p => (
                                                <div key={p.id} className="flex justify-between items-center p-4 bg-white border rounded-2xl">
                                                    <span className="text-sm font-bold">{p.name} - {p.status}</span>
                                                    <button onClick={() => window.fb.remove(window.fb.ref(window.db, `products/${p.id}`))} className="text-red-500 text-xs font-bold">Delete</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* DETAIL PAGE MODAL */}
                    <AnimatePresence>
                        {selectedProduct && (
                            <motion.div initial={{ y: '100%' }} animate={{ y: 0 }} exit={{ y: '100%' }} transition={{ type: 'spring', damping: 30, stiffness: 300 }} className="fixed inset-0 z-[150] bg-white overflow-y-auto">
                                <div className="max-w-6xl mx-auto px-6 py-12">
                                    <button onClick={() => setSelectedProduct(null)} className="mb-10 font-bold text-gray-300 flex items-center gap-2">
                                        <i data-lucide="arrow-left" className="w-4 h-4"></i> Back to Shop
                                    </button>
                                    
                                    <div className="grid md:grid-cols-2 gap-12 items-start">
                                        {/* Multi-Image Gallery */}
                                        <div className="flex gap-4 overflow-x-auto no-scrollbar snap-x snap-mandatory">
                                            {getImgs(selectedProduct).map((img, i) => (
                                                <img key={i} src={img} className="w-full aspect-square object-cover rounded-[40px] snap-center flex-shrink-0 bg-gray-50 border shadow-md" />
                                            ))}
                                        </div>

                                        <div className="space-y-8">
                                            <h2 className="text-5xl font-extrabold tracking-tighter leading-none">{selectedProduct.name}</h2>
                                            <p className="text-4xl font-black text-rose-500 italic font-display">Rs. {selectedProduct.price}</p>
                                            <div className="bg-gray-50 p-6 rounded-[32px] text-gray-500 leading-relaxed font-medium">
                                                {selectedProduct.desc || "Handcrafted aesthetic art from GippyeS Studio. Every piece is made with premium materials and high-quality pipe cleaners."}
                                            </div>
                                            
                                            <button 
                                                disabled={selectedProduct.status !== 'available'}
                                                onClick={() => {setCart([...cart, selectedProduct]); setSelectedProduct(null); alert("Added to Bag!");}}
                                                className={`w-full py-6 rounded-full font-bold text-lg shadow-2xl transition-all ${
                                                    selectedProduct.status === 'available' 
                                                    ? 'bg-zinc-900 text-white active:scale-95' 
                                                    : 'bg-gray-100 text-gray-400 cursor-not-allowed'
                                                }`}
                                            >
                                                {selectedProduct.status === 'oos' ? 'Sold Out' : selectedProduct.status === 'soon' ? 'Coming Soon' : 'Add to Bag'}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <footer className="py-20 text-center opacity-10">
                        <p onClick={() => setPage('admin')} className="text-[8px] font-bold tracking-[0.5em] uppercase cursor-pointer">Admin Access</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
