<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GippyeS Studio | Pipe Cleaner Art</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaCTU_JPXQjLP2N0zP1YYa2bRZiVh1FPY",
            authDomain: "gippyes-studio.firebaseapp.com",
            databaseURL: "https://gippyes-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gippyes-studio",
            storageBucket: "gippyes-studio.firebasestorage.app",
            messagingSenderId: "985706700769",
            appId: "1:985706700769:web:03eebf72dda5d59121fca0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.fb = { ref, onValue, push, remove };
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8f6f6; scroll-behavior: smooth; }
        .font-display { font-family: 'Playfair Display', serif; }
        .bg-primary { background-color: #fb7185; }
        .text-primary { color: #fb7185; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .product-card:hover img { transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [page, setPage] = useState('home');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [pass, setPass] = useState("");

            useEffect(() => {
                const checkFirebase = setInterval(() => {
                    if (window.db && window.fb) {
                        const productsRef = window.fb.ref(window.db, 'products');
                        window.fb.onValue(productsRef, (snapshot) => {
                            const data = snapshot.val();
                            if (data) {
                                const list = Object.keys(data).map(key => ({ id: key, ...data[key] }));
                                setProducts(list);
                            } else { setProducts([]); }
                        });
                        clearInterval(checkFirebase);
                    }
                }, 500);
                return () => clearInterval(checkFirebase);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [page, products, cart]);

            const addNewProduct = (e) => {
                e.preventDefault();
                const newP = {
                    name: e.target.name.value,
                    price: Number(e.target.price.value),
                    image: e.target.image.value
                };
                window.fb.push(window.fb.ref(window.db, 'products'), newP);
                e.target.reset();
                alert("Product Added for All Devices!");
            };

            const deleteProduct = (id) => {
                if(confirm("Delete this?")) {
                    window.fb.remove(window.fb.ref(window.db, `products/${id}`));
                }
            };

            const total = cart.reduce((s, i) => s + i.price, 0);

            const handlePayment = () => {
                const upiUrl = `upi://pay?pa=mahirabha0@okhdfcbank&pn=GippyeS%20Studio&am=${total}&cu=INR`;
                window.location.href = upiUrl;
                setTimeout(() => {
                    const msg = `New Order!\nTotal: Rs. ${total}\nI have paid via UPI.`;
                    window.open(`https://wa.me/917383455094?text=${encodeURIComponent(msg)}`, '_blank');
                }, 2000);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* NAVBAR */}
                    <nav className="bg-white/80 backdrop-blur-md border-b border-pink-100 p-4 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setPage('home')}>
                                <div className="w-12 h-12 rounded-full bg-pink-100 flex items-center justify-center text-primary font-bold">GS</div>
                                <div>
                                    <h1 className="text-xl font-black leading-none text-slate-900">GippyeS</h1>
                                    <span className="text-[10px] text-primary font-bold uppercase tracking-widest">Studio</span>
                                </div>
                            </div>
                            <button onClick={() => setPage('cart')} className="relative p-2">
                                <i data-lucide="shopping-bag"></i>
                                {cart.length > 0 && <span className="absolute top-0 right-0 bg-primary text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center font-bold border-2 border-white">{cart.length}</span>}
                            </button>
                        </div>
                    </nav>

                    {/* HERO SECTION */}
                    <div className={`page ${page === 'home' ? 'active' : ''}`}>
                        <section className="bg-gradient-to-br from-pink-50 to-pink-100 py-20 px-6 rounded-b-[60px] mb-16">
                            <div className="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">
                                <div className="space-y-8">
                                    <span className="bg-white px-4 py-1 rounded-full text-primary text-xs font-bold uppercase tracking-widest shadow-sm">Handmade with Love</span>
                                    <h2 className="font-display text-6xl md:text-8xl font-black tracking-tight leading-none text-slate-900">Handmade <br/><span className="text-primary italic text-6xl">Pipe Cleaner Dreams</span></h2>
                                    <p className="text-slate-500 text-lg font-medium max-w-md">Personalized bouquets and character charms.</p>
                                    <button onClick={() => document.getElementById('shop').scrollIntoView()} className="bg-primary text-white px-10 py-5 rounded-[24px] font-bold shadow-xl">Explore Collection</button>
                                </div>
                                <div className="hidden md:grid grid-cols-2 gap-4">
                                    <div className="bg-white p-2 rounded-[40px] shadow-2xl rotate-[-2deg]">
                                        <img src="https://picsum.photos/seed/pipe1/400/600" className="rounded-[35px]" />
                                    </div>
                                    <div className="bg-white p-2 rounded-[40px] shadow-2xl translate-y-12 rotate-[2deg]">
                                        <img src="https://picsum.photos/seed/pipe2/400/600" className="rounded-[35px]" />
                                    </div>
                                </div>
                            </div>
                        </section>

                        <section id="shop" className="max-w-6xl mx-auto p-6 py-10">
                            <h3 className="font-display text-4xl font-black mb-12 text-slate-900">Shop the Collection</h3>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-10">
                                {products.map(p => (
                                    <div key={p.id} className="product-card group cursor-pointer" onClick={() => {setCart([...cart, p]); alert("Added!")}}>
                                        <div className="aspect-[4/5] rounded-[48px] overflow-hidden bg-white border border-slate-100 mb-6 relative shadow-sm">
                                            <img src={p.image} className="w-full h-full object-cover transition-transform duration-700" />
                                            <div className="absolute bottom-6 right-6 bg-white w-12 h-12 rounded-full flex items-center justify-center shadow-xl text-primary font-bold">+</div>
                                        </div>
                                        <h3 className="font-bold text-xl">{p.name}</h3>
                                        <p className="text-primary font-black text-lg">Rs. {p.price}</p>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </div>

                    {/* CART PAGE */}
                    <div className={`page ${page === 'cart' ? 'active' : ''}`}>
                        <div className="max-w-2xl mx-auto p-6 py-20 space-y-10">
                            <h2 className="text-5xl font-black text-slate-900">Your Cart</h2>
                            {cart.length === 0 ? (
                                <div className="py-20 text-center text-slate-400 font-medium bg-white rounded-[40px] border border-dashed">Cart is empty</div>
                            ) : (
                                <div className="space-y-8">
                                    {cart.map((item, i) => (
                                        <div key={i} className="flex justify-between items-center border-b pb-8">
                                            <span className="font-bold text-xl">{item.name}</span>
                                            <span className="font-black text-primary text-xl">Rs. {item.price}</span>
                                        </div>
                                    ))}
                                    <div className="text-4xl font-black flex justify-between">
                                        <span>Total</span>
                                        <span className="text-primary">Rs. {total}</span>
                                    </div>
                                    <button onClick={handlePayment} className="w-full bg-primary text-white py-6 rounded-[32px] font-bold shadow-2xl">Pay via UPI</button>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ADMIN PAGE */}
                    <div className={`page ${page === 'admin' ? 'active' : ''}`}>
                        <div className="max-w-4xl mx-auto p-6 py-20">
                            {!isAdmin ? (
                                <div className="text-center space-y-6 bg-white p-12 rounded-[40px] border shadow-sm">
                                    <h2 className="text-3xl font-black italic">Studio Login</h2>
                                    <input type="password" onChange={(e)=>setPass(e.target.value)} className="w-full p-4 border rounded-2xl max-w-xs text-center" placeholder="Password" />
                                    <br/><button onClick={() => pass === "gippyes123" ? setIsAdmin(true) : alert("Wrong Password")} className="bg-primary text-white px-10 py-3 rounded-xl font-bold">Login</button>
                                </div>
                            ) : (
                                <div className="space-y-12">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-4xl font-black italic">Management</h2>
                                        <button onClick={() => setIsAdmin(false)} className="text-primary font-bold">Exit</button>
                                    </div>
                                    <form onSubmit={addNewProduct} className="bg-white p-8 rounded-[40px] border space-y-4 shadow-sm">
                                        <input name="name" placeholder="Product Name" className="w-full p-4 bg-slate-50 rounded-2xl border-none" required />
                                        <input name="price" type="number" placeholder="Price" className="w-full p-4 bg-slate-50 rounded-2xl border-none" required />
                                        <input name="image" placeholder="Image Link" className="w-full p-4 bg-slate-50 rounded-2xl border-none" required />
                                        <button className="w-full bg-primary text-white py-4 rounded-2xl font-bold">Add Live to Shop</button>
                                    </form>
                                    <div className="space-y-4">
                                        {products.map(p => (
                                            <div key={p.id} className="flex justify-between items-center p-4 bg-white rounded-2xl border shadow-sm">
                                                <div className="flex items-center gap-3">
                                                    <img src={p.image} className="w-10 h-10 rounded-lg object-cover" />
                                                    <span className="font-bold text-sm">{p.name}</span>
                                                </div>
                                                <button onClick={() => deleteProduct(p.id)} className="text-rose-500 font-bold">Delete</button>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* FOOTER */}
                    <footer className="bg-white border-t p-16 mt-auto">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <p className="font-black text-2xl">GippyeS Studio</p>
                            <div className="flex gap-10">
                                <a href="https://instagram.com/_gippyes_studio_/" className="text-primary font-bold">Instagram</a>
                                <button onClick={() => setPage('admin')} className="text-slate-300 font-bold text-xs uppercase tracking-widest">Admin</button>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
