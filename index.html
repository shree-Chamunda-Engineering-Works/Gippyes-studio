<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GippyeS Studio | Premium Art</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700;1,900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaCTU_JPXQjLP2N0zP1YYa2bRZiVh1FPY",
            authDomain: "gippyes-studio.firebaseapp.com",
            databaseURL: "https://gippyes-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gippyes-studio",
            storageBucket: "gippyes-studio.firebasestorage.app",
            messagingSenderId: "985706700769",
            appId: "1:985706700769:web:03eebf72dda5d59121fca0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.fb = { ref, onValue, push, remove, update };
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #1d1d1f; overflow-x: hidden; }
        .font-display { font-family: 'Playfair Display', serif; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .glass-nav { background: rgba(255, 255, 255, 0.8); backdrop-filter: saturate(180%) blur(20px); }
        .apple-card { border-radius: 24px; transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
        .review-fade { mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        function App() {
            const [page, setPage] = useState('home');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [pass, setPass] = useState("");

            useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.db && window.fb) {
                        window.fb.onValue(window.fb.ref(window.db, 'products'), (snap) => {
                            const data = snap.val();
                            setProducts(data ? Object.keys(data).map(k => ({ id: k, ...data[k] })) : []);
                        });
                        clearInterval(checkFB);
                    }
                }, 500);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [page, products, cart, selectedProduct, isAdmin]);

            const getImgs = (p) => {
                if (Array.isArray(p.images)) return p.images;
                if (typeof p.images === 'string') return p.images.split(',').map(s => s.trim());
                return [p.image || "https://via.placeholder.com/600"];
            };

            return (
                <div className="min-h-screen">
                    <nav className="glass-nav border-b border-gray-50 p-4 sticky top-0 z-[100] flex justify-between items-center px-6 md:px-20">
                        <h1 onClick={() => setPage('home')} className="text-xl font-bold tracking-tighter cursor-pointer">GippyeS <span className="text-rose-500 text-[10px] uppercase tracking-widest">Studio</span></h1>
                        <button onClick={() => setPage('cart')} className="relative p-2">
                            <i data-lucide="shopping-bag" className="w-5 h-5 text-zinc-800"></i>
                            {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-zinc-900 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-bold">{cart.length}</span>}
                        </button>
                    </nav>

                    <main>
                        {page === 'home' && (
                            <div>
                                {/* HERO */}
                                <section className="h-[80vh] flex flex-col items-center justify-center text-center px-6">
                                    <motion.div initial={{ opacity: 0, y: 20 }} animate={{ opacity: 1, y: 0 }} transition={{ duration: 1 }}>
                                        <p className="text-[10px] font-bold tracking-[0.4em] text-rose-400 uppercase mb-4">Handmade Dreams</p>
                                        <h2 className="text-6xl md:text-8xl font-bold tracking-tighter leading-none mb-6 text-zinc-900">
                                            Handmade <br/> <span className="italic font-display text-rose-500">Pipe Cleaner</span> <br/> Dreams
                                        </h2>
                                        <button onClick={() => document.getElementById('shop').scrollIntoView({behavior:'smooth'})} className="bg-zinc-900 text-white px-10 py-4 rounded-full font-bold text-sm shadow-xl">Explore Collection</button>
                                    </motion.div>
                                </section>

                                {/* FEEDBACK SCROLL */}
                                <div className="py-8 border-y border-gray-50 overflow-hidden review-fade">
                                    <motion.div animate={{ x: [0, -1000] }} transition={{ repeat: Infinity, duration: 25, ease: "linear" }} className="flex gap-20 whitespace-nowrap text-gray-300 font-medium italic text-lg">
                                        {["Amazing quality! ✨", "The cutests flowers ever 🌸", "Fast shipping to Surat 🚚", "Beautifully handmade ❤️"].map((t, i) => (
                                            <span key={i}>"{t}"</span>
                                        ))}
                                        {["Amazing quality! ✨", "The cutests flowers ever 🌸", "Fast shipping to Surat 🚚", "Beautifully handmade ❤️"].map((t, i) => (
                                            <span key={i+4}>"{t}"</span>
                                        ))}
                                    </motion.div>
                                </div>

                                {/* GRID */}
                                <section id="shop" className="max-w-7xl mx-auto px-6 py-20">
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-10">
                                        {products.map(p => (
                                            <div key={p.id} onClick={() => setSelectedProduct(p)} className="apple-card group cursor-pointer">
                                                <div className="aspect-[4/5] rounded-[30px] overflow-hidden bg-gray-50 mb-4 relative">
                                                    <img src={getImgs(p)[0]} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-1000" />
                                                    {p.status === 'oos' && <div className="absolute inset-0 bg-white/60 flex items-center justify-center font-bold text-[10px] uppercase tracking-widest">Sold Out</div>}
                                                    {p.status === 'soon' && <div className="absolute inset-0 bg-rose-500/10 flex items-center justify-center font-bold text-[10px] uppercase tracking-widest text-rose-600">Coming Soon</div>}
                                                </div>
                                                <h3 className="font-bold text-sm text-zinc-800 px-2">{p.name}</h3>
                                                <p className="text-rose-500 font-black text-sm px-2">Rs. {p.price}</p>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {page === 'cart' && (
                            <div className="max-w-xl mx-auto px-6 py-20">
                                <h2 className="text-4xl font-bold mb-10 tracking-tight">Your Bag.</h2>
                                {cart.length === 0 ? <p className="text-gray-400 font-medium">Empty bag.</p> : (
                                    <div className="space-y-6">
                                        {cart.map((item, i) => (
                                            <div key={i} className="flex justify-between items-center p-6 bg-gray-50 rounded-[24px]">
                                                <span className="font-bold">{item.name}</span>
                                                <span className="font-black text-rose-500">Rs. {item.price}</span>
                                            </div>
                                        ))}
                                        <button className="w-full bg-zinc-900 text-white py-5 rounded-full font-bold">Order on WhatsApp</button>
                                    </div>
                                )}
                            </div>
                        )}

                        {page === 'admin' && (
                            <div className="max-w-4xl mx-auto px-6 py-20">
                                {!isAdmin ? (
                                    <div className="text-center">
                                        <input type="password" placeholder="Pass" className="border p-4 rounded-xl mb-4" onChange={e=>setPass(e.target.value)} />
                                        <button onClick={() => pass === 'gippyes123' && setIsAdmin(true)} className="block mx-auto bg-black text-white px-8 py-2 rounded-xl">Login</button>
                                    </div>
                                ) : (
                                    <div className="space-y-10">
                                        <div className="bg-gray-50 p-8 rounded-[32px]">
                                            <h3 className="font-bold mb-6 text-xl">Add New Product</h3>
                                            <form className="grid gap-4" onSubmit={(e) => {
                                                e.preventDefault();
                                                const newP = {
                                                    name: e.target.n.value,
                                                    price: Number(e.target.p.value),
                                                    images: e.target.i.value, // Multi URLs
                                                    desc: e.target.d.value,
                                                    status: e.target.s.value
                                                };
                                                window.fb.push(window.fb.ref(window.db, 'products'), newP);
                                                e.target.reset();
                                            }}>
                                                <input name="n" placeholder="Name" className="p-4 rounded-xl border-none" required />
                                                <input name="p" type="number" placeholder="Price" className="p-4 rounded-xl border-none" required />
                                                <textarea name="i" placeholder="Images (URL 1, URL 2, URL 3)" className="p-4 rounded-xl border-none" required />
                                                <textarea name="d" placeholder="Description" className="p-4 rounded-xl border-none" />
                                                <select name="s" className="p-4 rounded-xl border-none">
                                                    <option value="available">Available</option>
                                                    <option value="oos">Out of Stock</option>
                                                    <option value="soon">Coming Soon</option>
                                                </select>
                                                <button className="bg-rose-500 text-white py-4 rounded-xl font-bold">Add Product</button>
                                            </form>
                                        </div>
                                        <div className="grid gap-2">
                                            {products.map(p => (
                                                <div key={p.id} className="flex justify-between items-center p-4 bg-white border rounded-xl">
                                                    <span className="text-sm font-bold">{p.name} ({p.status})</span>
                                                    <button onClick={() => window.fb.remove(window.fb.ref(window.db, `products/${p.id}`))} className="text-red-500 text-xs">Delete</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* PRODUCT DETAIL MODAL */}
                    <AnimatePresence>
                        {selectedProduct && (
                            <motion.div initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }} className="fixed inset-0 z-[150] bg-white overflow-y-auto">
                                <div className="max-w-6xl mx-auto px-6 py-12 md:py-20">
                                    <button onClick={() => setSelectedProduct(null)} className="mb-10 font-bold text-gray-400 hover:text-black transition-colors flex items-center gap-2">
                                        <i data-lucide="arrow-left" className="w-4 h-4"></i> Back
                                    </button>
                                    
                                    <div className="grid md:grid-cols-2 gap-12">
                                        {/* Multi-Image Gallery */}
                                        <div className="flex gap-4 overflow-x-auto no-scrollbar snap-x snap-mandatory">
                                            {getImgs(selectedProduct).map((img, i) => (
                                                <img key={i} src={img} className="w-full aspect-square object-cover rounded-[32px] snap-center flex-shrink-0 bg-gray-50 border border-gray-100" />
                                            ))}
                                        </div>

                                        <div className="flex flex-col justify-center">
                                            <h2 className="text-4xl md:text-5xl font-bold tracking-tighter mb-4 text-zinc-900">{selectedProduct.name}</h2>
                                            <p className="text-2xl font-black text-rose-500 italic mb-8 font-display">Rs. {selectedProduct.price}</p>
                                            <p className="text-gray-500 leading-relaxed mb-10 text-lg">
                                                {selectedProduct.desc || "Every GippyeS creation is handcrafted with premium pipe cleaners. No two pieces are exactly alike, making your gift truly one-of-a-kind."}
                                            </p>
                                            
                                            {/* MINIMAL ADD TO CART BUTTON */}
                                            <div className="flex gap-4">
                                                <button 
                                                    disabled={selectedProduct.status !== 'available'}
                                                    onClick={() => {setCart([...cart, selectedProduct]); setSelectedProduct(null);}}
                                                    className={`px-12 py-4 rounded-full font-bold text-sm transition-all shadow-lg ${
                                                        selectedProduct.status === 'available' 
                                                        ? 'bg-zinc-900 text-white hover:brightness-110' 
                                                        : 'bg-gray-100 text-gray-400 cursor-not-allowed shadow-none'
                                                    }`}
                                                >
                                                    {selectedProduct.status === 'oos' ? 'Sold Out' : selectedProduct.status === 'soon' ? 'Coming Soon' : 'Add to Bag'}
                                                </button>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <footer className="py-20 text-center opacity-20">
                        <p onClick={() => setPage('admin')} className="text-[10px] font-bold tracking-[0.4em] uppercase cursor-pointer">Admin Dashboard</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
