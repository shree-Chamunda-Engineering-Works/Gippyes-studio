<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GippyeS Studio | Pipe Cleaner Art</title>
    <!-- Professional Tools -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&family=Playfair+Display:ital,wght@0,900;1,900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f8f6f6; scroll-behavior: smooth; }
        .font-display { font-family: 'Playfair Display', serif; }
        .bg-primary { background-color: #fb7185; }
        .text-primary { color: #fb7185; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .product-card:hover img { transform: scale(1.1); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- INITIAL DATA ---
        const DEFAULT_PRODUCTS = [
            { id: 1, name: 'Eternal Pink Lily Bouquet', price: 899, image: 'https://picsum.photos/seed/lily/800/1000' },
            { id: 2, name: 'Blue Daisy Charm', price: 350, image: 'https://picsum.photos/seed/daisy/800/1000' }
        ];

        function App() {
            const [page, setPage] = useState('home');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [adminPass, setAdminPass] = useState("");
            const [isAdminLoggedIn, setIsAdminLoggedIn] = useState(false);

            // Load products from LocalStorage
            useEffect(() => {
                const saved = localStorage.getItem('gippyes_products');
                if (saved) {
                    setProducts(JSON.parse(saved));
                } else {
                    setProducts(DEFAULT_PRODUCTS);
                    localStorage.setItem('gippyes_products', JSON.stringify(DEFAULT_PRODUCTS));
                }
                lucide.createIcons();
            }, []);

            useEffect(() => { lucide.createIcons(); }, [page, products, cart]);

            const saveProducts = (newProducts) => {
                setProducts(newProducts);
                localStorage.setItem('gippyes_products', JSON.stringify(newProducts));
            };

            const addToCart = (p) => {
                setCart([...cart, p]);
                alert("Added to cart!");
            };

            const removeFromCart = (index) => {
                const newCart = [...cart];
                newCart.splice(index, 1);
                setCart(newCart);
            };

            const addNewProduct = (e) => {
                e.preventDefault();
                const name = e.target.name.value;
                const price = e.target.price.value;
                const image = e.target.image.value;
                const newP = { id: Date.now(), name, price: Number(price), image };
                saveProducts([...products, newP]);
                e.target.reset();
                alert("Product Added Successfully!");
            };

            const deleteProduct = (id) => {
                if(confirm("Delete this product?")) {
                    saveProducts(products.filter(p => p.id !== id));
                }
            };

            const total = cart.reduce((s, i) => s + i.price, 0);

            // --- AUTOMATIC GPAY / UPI LOGIC ---
            const handlePayment = () => {
                if (cart.length === 0) return;

                const upiId = "mahirabha0@okhdfcbank";
                const payeeName = "GippyeS Studio";
                // This link opens GPay/PhonePe/Paytm automatically on mobile
                const upiUrl = `upi://pay?pa=${upiId}&pn=${encodeURIComponent(payeeName)}&am=${total}&cu=INR`;
                
                // 1. Try to open the UPI App
                window.location.href = upiUrl;

                // 2. After a short delay, redirect to WhatsApp to confirm the order
                setTimeout(() => {
                    const msg = `New Order from GippyeS Studio!\n\nItems:\n${cart.map(i => `- ${i.name}`).join('\n')}\n\nTotal: Rs. ${total}\n\nI have just completed the payment via UPI. Please confirm my order!`;
                    window.open(`https://wa.me/917383455094?text=${encodeURIComponent(msg)}`, '_blank');
                    setCart([]);
                    setPage('home');
                }, 2000);
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* NAVBAR */}
                    <nav className="bg-white/80 backdrop-blur-md border-b border-pink-100 p-4 sticky top-0 z-50">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3 cursor-pointer" onClick={() => setPage('home')}>
                                <img src="logo.jpg" className="w-12 h-12 rounded-full border-2 border-pink-100" onError={(e) => e.target.src="https://api.dicebear.com/7.x/initials/svg?seed=GS&backgroundColor=fb7185"} />
                                <div>
                                    <h1 className="text-xl font-black leading-none text-slate-900">GippyeS</h1>
                                    <span className="text-[10px] text-primary font-bold uppercase tracking-widest">Studio</span>
                                </div>
                            </div>
                            <div className="flex items-center gap-6">
                                <button onClick={() => setPage('cart')} className="relative text-slate-600 p-2">
                                    <i data-lucide="shopping-bag"></i>
                                    {cart.length > 0 && <span className="absolute -top-1 -right-1 bg-primary text-white text-[10px] rounded-full w-5 h-5 flex items-center justify-center font-bold border-2 border-white">{cart.length}</span>}
                                </button>
                            </div>
                        </div>
                    </nav>

                    {/* HOME PAGE */}
                    <div className={`page ${page === 'home' ? 'active' : ''}`}>
                        <section className="bg-gradient-to-br from-pink-50 to-pink-100 py-20 px-6 rounded-b-[60px] mb-16 text-center md:text-left">
                            <div className="max-w-6xl mx-auto grid md:grid-cols-2 gap-12 items-center">
                                <div className="space-y-8">
                                    <span className="bg-white px-4 py-1 rounded-full text-primary text-xs font-bold uppercase tracking-widest shadow-sm">Handmade with Love</span>
                                    <h2 className="font-display text-6xl md:text-8xl font-black tracking-tight leading-none text-slate-900">Handmade <br/><span className="text-primary italic">Pipe Cleaner Dreams</span></h2>
                                    <p className="text-slate-500 text-lg font-medium max-w-md mx-auto md:mx-0">Specializing in trendy handmade work, from personalized bouquets to character charms.</p>
                                    <button onClick={() => document.getElementById('shop').scrollIntoView()} className="bg-primary text-white px-10 py-5 rounded-[24px] font-bold shadow-xl shadow-primary/20 hover:scale-105 transition-transform">Explore Collection</button>
                                </div>
                                <div className="hidden md:grid grid-cols-2 gap-4">
                                    <img src="https://image2url.com/r2/default/images/1772530152026-19c7e59e-46ff-438a-a4ef-2233852fe4dc.png" className="rounded-[40px] shadow-2xl rotate-[-2deg]" />
                                    <img src="https://image2url.com/r2/default/images/1772530567631-7a1a24d3-2a97-4d47-8abf-31d7261933be.png" className="rounded-[40px] shadow-2xl translate-y-12 rotate-[2deg]" />
                                </div>
                            </div>
                        </section>

                        <section id="shop" className="max-w-6xl mx-auto p-6 py-10">
                            <h3 className="font-display text-4xl font-black mb-12 text-slate-900">Shop the Collection</h3>
                            <div className="grid grid-cols-2 md:grid-cols-3 gap-10">
                                {products.map(p => (
                                    <div key={p.id} className="product-card group cursor-pointer" onClick={() => addToCart(p)}>
                                        <div className="aspect-[4/5] rounded-[48px] overflow-hidden bg-white border border-slate-100 mb-6 relative shadow-sm">
                                            <img src={p.image} className="w-full h-full object-cover transition-transform duration-700" />
                                            <div className="absolute bottom-6 right-6 bg-white w-12 h-12 rounded-full flex items-center justify-center shadow-xl opacity-0 group-hover:opacity-100 transition-all translate-y-2 group-hover:translate-y-0 text-primary font-bold">+</div>
                                        </div>
                                        <h3 className="font-bold text-xl group-hover:text-primary transition-colors">{p.name}</h3>
                                        <p className="text-primary font-black text-lg">Rs. {p.price}</p>
                                    </div>
                                ))}
                            </div>
                        </section>
                    </div>

                    {/* CART PAGE */}
                    <div className={`page ${page === 'cart' ? 'active' : ''}`}>
                        <div className="max-w-2xl mx-auto p-6 py-20 space-y-10">
                            <h2 className="text-5xl font-black tracking-tight text-slate-900">Your Studio Cart</h2>
                            {cart.length === 0 ? (
                                <div className="py-20 text-center text-slate-400 font-medium bg-white rounded-[40px] border border-dashed">Your cart is empty...</div>
                            ) : (
                                <div className="space-y-8">
                                    {cart.map((item, i) => (
                                        <div key={i} className="flex justify-between items-center border-b border-pink-50 pb-8">
                                            <div className="flex gap-6 items-center">
                                                <img src={item.image} className="w-20 h-20 rounded-3xl object-cover" />
                                                <span className="font-bold text-xl text-slate-900">{item.name}</span>
                                            </div>
                                            <div className="flex items-center gap-6">
                                                <span className="font-black text-primary text-xl">Rs. {item.price}</span>
                                                <button onClick={() => removeFromCart(i)} className="text-rose-300 hover:text-rose-600">✕</button>
                                            </div>
                                        </div>
                                    ))}
                                    <div className="text-4xl font-black flex justify-between pt-6">
                                        <span>Total</span>
                                        <span className="text-primary">Rs. {total}</span>
                                    </div>
                                    <div className="bg-rose-50 p-6 rounded-3xl border border-rose-100">
                                        <p className="text-xs text-slate-500 text-center font-bold uppercase tracking-widest mb-4">Clicking below will open GPay / UPI app</p>
                                        <button onClick={handlePayment} className="w-full bg-primary text-white py-6 rounded-[32px] font-bold shadow-2xl shadow-primary/30 text-xl flex items-center justify-center gap-3">
                                            <i data-lucide="smartphone"></i>
                                            PAY Rs. {total} VIA UPI
                                        </button>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* ADMIN PAGE */}
                    <div className={`page ${page === 'admin' ? 'active' : ''}`}>
                        <div className="max-w-4xl mx-auto p-6 py-20">
                            {!isAdminLoggedIn ? (
                                <div className="text-center space-y-6 bg-white p-12 rounded-[40px] border shadow-sm">
                                    <h2 className="text-3xl font-black">Admin Login</h2>
                                    <input 
                                        type="password" 
                                        placeholder="Enter Password" 
                                        className="p-4 border rounded-2xl w-full max-w-xs text-center"
                                        onChange={(e) => setAdminPass(e.target.value)}
                                    />
                                    <br/>
                                    <button 
                                        onClick={() => adminPass === "gippyes123" ? setIsAdminLoggedIn(true) : alert("Wrong Password")}
                                        className="bg-primary text-white px-10 py-3 rounded-xl font-bold"
                                    >Login</button>
                                </div>
                            ) : (
                                <div className="space-y-12">
                                    <div className="flex justify-between items-center">
                                        <h2 className="text-4xl font-black">Studio Management</h2>
                                        <button onClick={() => setIsAdminLoggedIn(false)} className="text-primary font-bold">Logout</button>
                                    </div>
                                    
                                    <div className="grid md:grid-cols-2 gap-10">
                                        <div className="bg-white p-8 rounded-[40px] border shadow-sm">
                                            <h3 className="text-xl font-bold mb-6">Add New Product</h3>
                                            <form onSubmit={addNewProduct} className="space-y-4">
                                                <input name="name" placeholder="Product Name" className="w-full p-4 bg-slate-50 rounded-2xl border-none" required />
                                                <input name="price" placeholder="Price (Rs.)" type="number" className="w-full p-4 bg-slate-50 rounded-2xl border-none" required />
                                                <input name="image" placeholder="Image URL (Imgur link)" className="w-full p-4 bg-slate-50 rounded-2xl border-none" required />
                                                <button type="submit" className="w-full bg-primary text-white py-4 rounded-2xl font-bold">Add to Shop</button>
                                            </form>
                                        </div>

                                        <div className="bg-white p-8 rounded-[40px] border shadow-sm">
                                            <h3 className="text-xl font-bold mb-6">Current Inventory</h3>
                                            <div className="space-y-4 max-h-[400px] overflow-y-auto pr-2">
                                                {products.map(p => (
                                                    <div key={p.id} className="flex justify-between items-center p-3 bg-slate-50 rounded-2xl">
                                                        <div className="flex items-center gap-3">
                                                            <img src={p.image} className="w-10 h-10 rounded-lg object-cover" />
                                                            <span className="font-bold text-sm">{p.name}</span>
                                                        </div>
                                                        <button onClick={() => deleteProduct(p.id)} className="text-rose-500 font-bold text-xs">Delete</button>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* FOOTER */}
                    <footer className="bg-white border-t border-pink-50 p-16 mt-auto">
                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-12">
                            <div className="flex items-center gap-4">
                                <img src="logo.jpg" className="w-14 h-14 rounded-full" onError={(e) => e.target.style.display='none'} />
                                <div className="text-left">
                                    <p className="font-black text-2xl text-slate-900">GippyeS Studio</p>
                                    <p className="text-[10px] text-slate-400 uppercase font-bold tracking-widest">Pipe Cleaner Florals & Custom Gifts</p>
                                </div>
                            </div>
                            <div className="flex gap-10">
                                <a href="https://www.instagram.com/_gippyes_studio_/" target="_blank" className="text-primary font-bold text-lg">Instagram</a>
                                <button onClick={() => setPage('admin')} className="text-slate-300 font-bold text-xs uppercase tracking-widest hover:text-primary">Admin</button>
                            </div>
                        </div>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
