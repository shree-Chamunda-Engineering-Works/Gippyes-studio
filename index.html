<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GippyeS Studio | Fixed Cart & Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Playfair+Display:ital,wght@0,700;1,700;1,900&display=swap" rel="stylesheet">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push, remove, update, set } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBaCTU_JPXQjLP2N0zP1YYa2bRZiVh1FPY",
            authDomain: "gippyes-studio.firebaseapp.com",
            databaseURL: "https://gippyes-studio-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "gippyes-studio",
            storageBucket: "gippyes-studio.firebasestorage.app",
            messagingSenderId: "985706700769",
            appId: "1:985706700769:web:03eebf72dda5d59121fca0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        window.db = db;
        window.fb = { ref, onValue, push, remove, update, set };
    </script>

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #ffffff; color: #1d1d1f; -webkit-tap-highlight-color: transparent; }
        .font-display { font-family: 'Playfair Display', serif; }
        .glass-nav { background: rgba(255, 255, 255, 0.85); backdrop-filter: saturate(180%) blur(20px); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .apple-card { border-radius: 24px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .review-fade { mask-image: linear-gradient(to right, transparent, black 15%, black 85%, transparent); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { motion, AnimatePresence } = window.Motion;

        function App() {
            const [page, setPage] = useState('home');
            const [products, setProducts] = useState([]);
            const [cart, setCart] = useState([]);
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [isAdmin, setIsAdmin] = useState(false);
            const [pass, setPass] = useState("");
            const [addedAnim, setAddedAnim] = useState(false);

            useEffect(() => {
                const checkFB = setInterval(() => {
                    if (window.db && window.fb) {
                        window.fb.onValue(window.fb.ref(window.db, 'products'), (snap) => {
                            const data = snap.val();
                            setProducts(data ? Object.keys(data).map(k => ({ id: k, ...data[k] })) : []);
                        });
                        clearInterval(checkFB);
                    }
                }, 500);
            }, []);

            useEffect(() => { lucide.createIcons(); }, [page, products, cart, selectedProduct, isAdmin, addedAnim]);

            const getImgs = (p) => {
                if (!p) return [];
                if (Array.isArray(p.images)) return p.images;
                if (typeof p.images === 'string') return p.images.split(',').map(s => s.trim());
                return [p.image || "https://via.placeholder.com/600"];
            };

            const handleAddToCart = (item) => {
                setCart(prev => [...prev, { ...item, instanceId: Date.now() }]);
                setAddedAnim(true);
                setTimeout(() => {
                    setAddedAnim(false);
                    setSelectedProduct(null);
                }, 800);
            };

            const toggleStatus = (id, newStatus) => {
                window.fb.update(window.fb.ref(window.db, `products/${id}`), { status: newStatus });
            };

            return (
                <div className="min-h-screen">
                    {/* NAVIGATION */}
                    <nav className="glass-nav border-b border-gray-50 p-4 sticky top-0 z-[100] flex justify-between items-center px-6 md:px-20">
                        <h1 onClick={() => setPage('home')} className="text-xl font-extrabold tracking-tighter cursor-pointer">GippyeS <span className="text-rose-500 text-[10px] uppercase tracking-[0.3em]">Studio</span></h1>
                        <button onClick={() => setPage('cart')} className="relative p-2 rounded-full hover:bg-gray-50 transition-colors">
                            <i data-lucide="shopping-bag" className="w-5 h-5"></i>
                            {cart.length > 0 && (
                                <span className="absolute -top-0.5 -right-0.5 bg-rose-500 text-white text-[8px] w-4 h-4 rounded-full flex items-center justify-center font-black">
                                    {cart.length}
                                </span>
                            )}
                        </button>
                    </nav>

                    <main>
                        {page === 'home' && (
                            <div className="pb-20">
                                {/* HERO */}
                                <section className="h-[70vh] flex flex-col items-center justify-center text-center px-6">
                                    <motion.div initial={{ opacity: 0, scale: 0.95 }} animate={{ opacity: 1, scale: 1 }}>
                                        <p className="text-[10px] font-bold tracking-[0.5em] text-rose-400 uppercase mb-4">Crafting Aesthetic Joy</p>
                                        <h2 className="text-6xl md:text-8xl font-bold tracking-tighter mb-8 leading-none">
                                            Handmade <br/> <span className="italic font-display text-rose-500">Pipe Cleaner</span> <br/> Dreams
                                        </h2>
                                        <button onClick={() => document.getElementById('shop').scrollIntoView({behavior:'smooth'})} className="bg-zinc-900 text-white px-10 py-4 rounded-full font-bold text-sm shadow-2xl">Explore Collection</button>
                                    </motion.div>
                                </section>

                                {/* REVIEWS FADE */}
                                <div className="py-8 border-y border-gray-50 overflow-hidden review-fade bg-white mb-20">
                                    <motion.div animate={{ x: [0, -1200] }} transition={{ repeat: Infinity, duration: 30, ease: "linear" }} className="flex gap-24 whitespace-nowrap text-gray-300 font-semibold italic text-xl">
                                        {["Premium quality ✨", "Super aesthetic packaging 🌸", "Loved my keychain! ❤️", "Fastest delivery in Surat 🚚", "100% recommended! 🍓"].map((t, i) => (
                                            <span key={i}>"{t}"</span>
                                        ))}
                                        {["Premium quality ✨", "Super aesthetic packaging 🌸", "Loved my keychain! ❤️", "Fastest delivery in Surat 🚚", "100% recommended! 🍓"].map((t, i) => (
                                            <span key={i+100}>"{t}"</span>
                                        ))}
                                    </motion.div>
                                </div>

                                {/* SHOP GRID */}
                                <section id="shop" className="max-w-7xl mx-auto px-6">
                                    <h3 className="text-3xl font-bold tracking-tighter mb-10 opacity-30 uppercase text-[12px] tracking-[0.5em]">The Storefront</h3>
                                    <div className="grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-12">
                                        {products.map(p => (
                                            <div key={p.id} onClick={() => setSelectedProduct(p)} className="apple-card group cursor-pointer">
                                                <div className="aspect-square rounded-[32px] overflow-hidden bg-gray-50 mb-4 relative shadow-sm border border-gray-50">
                                                    <img src={getImgs(p)[0]} className="w-full h-full object-cover group-hover:scale-110 transition-transform duration-[1.5s]" />
                                                    {p.status === 'oos' && <div className="absolute inset-0 bg-white/70 backdrop-blur-sm flex items-center justify-center font-bold text-[10px] uppercase tracking-widest">Sold Out</div>}
                                                    {p.status === 'soon' && <div className="absolute inset-0 bg-rose-50/20 backdrop-blur-sm flex items-center justify-center font-bold text-[10px] uppercase tracking-widest text-rose-500">Coming Soon</div>}
                                                </div>
                                                <div className="px-2">
                                                    <h4 className="font-bold text-[15px] text-zinc-800 mb-0.5 truncate">{p.name}</h4>
                                                    <p className="text-rose-500 font-black text-sm italic">Rs. {p.price}</p>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </section>
                            </div>
                        )}

                        {page === 'cart' && (
                            <div className="max-w-xl mx-auto px-6 py-20">
                                <h2 className="text-5xl font-bold mb-12 tracking-tighter">Your Bag.</h2>
                                {cart.length === 0 ? (
                                    <div className="text-center py-20 bg-gray-50 rounded-[40px]">
                                        <p className="text-gray-400 font-bold mb-4">Nothing here yet.</p>
                                        <button onClick={()=>setPage('home')} className="text-rose-500 font-bold underline underline-offset-4">Go Shop</button>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {cart.map((item, i) => (
                                            <div key={i} className="flex justify-between items-center p-6 bg-white border border-gray-100 rounded-[28px] shadow-sm">
                                                <div className="flex items-center gap-4">
                                                    <img src={getImgs(item)[0]} className="w-14 h-14 rounded-2xl object-cover" />
                                                    <span className="font-bold text-sm">{item.name}</span>
                                                </div>
                                                <span className="font-black">Rs. {item.price}</span>
                                            </div>
                                        ))}
                                        <div className="pt-10 border-t border-gray-100 mt-10">
                                            <div className="flex justify-between mb-8 px-2 items-end">
                                                <span className="font-bold text-gray-300 text-xs uppercase tracking-widest">Subtotal</span>
                                                <span className="text-4xl font-black">Rs. {cart.reduce((s,i) => s + i.price, 0)}</span>
                                            </div>
                                            <button className="w-full bg-zinc-900 text-white py-6 rounded-full font-bold text-lg shadow-xl active:scale-95 transition-all">Order via WhatsApp</button>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}

                        {page === 'admin' && (
                            <div className="max-w-4xl mx-auto px-6 py-20">
                                {!isAdmin ? (
                                    <div className="text-center bg-gray-50 p-12 rounded-[40px]">
                                        <input type="password" placeholder="Passphrase" className="border-none bg-white p-5 rounded-2xl mb-4 w-full max-w-xs shadow-inner" onChange={e=>setPass(e.target.value)} />
                                        <button onClick={() => pass === 'gippyes123' && setIsAdmin(true)} className="block mx-auto bg-black text-white px-12 py-4 rounded-full font-bold">Verify Access</button>
                                    </div>
                                ) : (
                                    <div className="space-y-12">
                                        <div className="bg-gray-50 p-8 rounded-[40px]">
                                            <h3 className="font-bold mb-6 text-xl px-2">Inventory Control</h3>
                                            <div className="grid gap-4">
                                                {products.map(p => (
                                                    <div key={p.id} className="flex flex-wrap justify-between items-center p-5 bg-white rounded-3xl border border-gray-100">
                                                        <div className="flex items-center gap-4">
                                                            <img src={getImgs(p)[0]} className="w-12 h-12 rounded-2xl object-cover" />
                                                            <span className="font-bold text-sm">{p.name}</span>
                                                        </div>
                                                        <div className="flex items-center gap-3">
                                                            <select 
                                                                value={p.status || 'available'} 
                                                                onChange={(e) => toggleStatus(p.id, e.target.value)}
                                                                className="text-xs bg-zinc-100 border-none rounded-xl p-3 font-bold cursor-pointer"
                                                            >
                                                                <option value="available">Available ✅</option>
                                                                <option value="oos">Out of Stock ❌</option>
                                                                <option value="soon">Coming Soon ⏳</option>
                                                            </select>
                                                            <button onClick={() => window.fb.remove(window.fb.ref(window.db, `products/${p.id}`))} className="p-3 text-red-300 hover:text-red-500"><i data-lucide="trash-2" className="w-5 h-5"></i></button>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="p-8 border-4 border-dashed border-gray-100 rounded-[40px]">
                                            <h3 className="font-bold mb-6 text-xl text-gray-300">Add New Product</h3>
                                            {/* (Previous Form Logic Remains the same) */}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </main>

                    {/* DETAIL MODAL */}
                    <AnimatePresence>
                        {selectedProduct && (
                            <motion.div initial={{ y: '100%' }} animate={{ y: 0 }} exit={{ y: '100%' }} transition={{ type: 'spring', damping: 25, stiffness: 200 }} className="fixed inset-0 z-[150] bg-white overflow-y-auto">
                                <div className="max-w-6xl mx-auto px-6 py-12">
                                    <button onClick={() => setSelectedProduct(null)} className="mb-10 font-bold text-gray-300 hover:text-black transition-colors flex items-center gap-2">
                                        <i data-lucide="arrow-left" className="w-4 h-4"></i> Back
                                    </button>
                                    
                                    <div className="grid md:grid-cols-2 gap-12 lg:gap-20 items-center">
                                        <div className="flex gap-4 overflow-x-auto no-scrollbar snap-x snap-mandatory">
                                            {getImgs(selectedProduct).map((img, i) => (
                                                <img key={i} src={img} className="w-full aspect-square object-cover rounded-[40px] snap-center flex-shrink-0 bg-gray-50 border border-gray-100 shadow-2xl" />
                                            ))}
                                        </div>

                                        <div className="flex flex-col items-start">
                                            <h2 className="text-5xl md:text-7xl font-extrabold tracking-tighter mb-4">{selectedProduct.name}</h2>
                                            <p className="text-4xl font-black text-rose-500 italic mb-8 font-display">Rs. {selectedProduct.price}</p>
                                            <p className="text-gray-400 leading-relaxed mb-12 text-lg font-medium">
                                                {selectedProduct.desc || "Every GippyeS creation is handcrafted with premium pipe cleaners. This piece is unique, durable, and designed to bring aesthetic joy to your space."}
                                            </p>
                                            
                                            {/* FIXED ADD TO BAG BUTTON */}
                                            <button 
                                                disabled={selectedProduct.status !== 'available' || addedAnim}
                                                onClick={() => handleAddToCart(selectedProduct)}
                                                className={`group relative w-full md:w-auto px-16 py-5 rounded-full font-bold text-sm transition-all shadow-xl overflow-hidden ${
                                                    selectedProduct.status === 'available' 
                                                    ? 'bg-zinc-900 text-white active:scale-95' 
                                                    : 'bg-gray-100 text-gray-300 cursor-not-allowed shadow-none'
                                                }`}
                                            >
                                                <span className={addedAnim ? 'opacity-0' : 'opacity-100'}>
                                                    {selectedProduct.status === 'oos' ? 'Sold Out' : selectedProduct.status === 'soon' ? 'Coming Soon' : 'Add to Bag'}
                                                </span>
                                                {addedAnim && (
                                                    <div className="absolute inset-0 flex items-center justify-center bg-rose-500 text-white">
                                                        <i data-lucide="check" className="w-6 h-6 mr-2"></i> Added!
                                                    </div>
                                                )}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <footer className="py-20 text-center opacity-10">
                        <p onClick={() => setPage('admin')} className="text-[10px] font-bold tracking-[0.5em] uppercase cursor-pointer">System Admin</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
